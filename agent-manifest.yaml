Descriptor:
  Name: NoisyNeighbourAgentInteractive
  DisplayName: Noisy Neighbour Agent Interactive
  Description: >-
    Interactive Security Copilot agent for investigating Microsoft Intune noisy
    neighbour automation patterns using real audit events from Microsoft Graph.
  Icon: https://raw.githubusercontent.com/schenardie/Noisy-Neighbour-Agent/main/icon.png

  Authorization:
    Type: AADDelegated
    EntraScopes: https://graph.microsoft.com/.default

  SupportedAuthTypes:
    - AADDelegated

AgentDefinitions:
  - Name: NoisyNeighbourInteractive
    DisplayName: Noisy Neighbour Agent
    Description: >-
      Interactive agent that retrieves Microsoft Intune audit events and analyzes
      them for repetitive noisy neighbour behavior using only retrieved tenant data.
    Publisher: Custom
    Product: Intune
    RequiredSkillsets:
      - NoisyNeighbourAgentInteractive
    AgentSingleInstanceConstraint: None
    Triggers:
      - Name: Default
        DefaultPollPeriodSeconds: 0
        ProcessSkill: NoisyNeighbourAgentInteractive.NoisyNeighbourInteractiveAgent
    PromptSkill: NoisyNeighbourAgentInteractive.NoisyNeighbourInteractiveAgent

SkillGroups:
  - Format: API
    Settings:
      OpenApiSpecUrl: https://raw.githubusercontent.com/schenardie/Noisy-Neighbour-Agent/main/openapi.yaml

  - Format: GPT
    Skills:
      - Name: SummarizeIntuneAuditBatch
        DisplayName: Summarize Intune Audit Batch
        Description: >-
          Summarizes one batch of Intune audit events into compact write-action
          statistics and candidate repetitive patterns without inventing any facts.
        Inputs:
          - Name: auditLogBatchData
            Description: JSON array for one retrieved audit log page or batch.
            Required: true
        Settings:
          ModelName: gpt-4.1
          Template: |-
            You are a Microsoft Intune audit summarizer.

            Audit batch data:
            {{auditLogBatchData}}

            Mandatory rules:
            - Use ONLY the provided auditLogBatchData.
            - Never invent actors, domains, counts, dates, or events.
            - If the JSON is empty, malformed, or missing, return exactly:
              {"error":"no valid auditLogBatchData was provided"}
            - Never use placeholder domains or sample identities such as contoso.com,
              tenantdomain.com, john.doe, or jane.smith unless they exist in the JSON.

            Write-action scope:
            - Keep only write-like operations:
              - activityOperationType in {patch, create, delete, setReference, deleteReference}
              - OR activityType contains write verbs such as PUT or PATCH.
            - Exclude non-write activity from counts.

            Return STRICT JSON with this shape only:
            {
              "batch_event_count": number,
              "batch_write_event_count": number,
              "first_event_timestamp": "string or null",
              "last_event_timestamp": "string or null",
              "top_actors": [
                {
                  "actor_name": "string",
                  "actor_type": "string",
                  "event_count": number,
                  "top_activity_types": ["string"],
                  "first_seen": "string",
                  "last_seen": "string"
                }
              ],
              "candidate_groups": [
                {
                  "actor_name": "string",
                  "actor_type": "string",
                  "activity_type": "string",
                  "resource_type": "string",
                  "resource_keys": ["string"],
                  "occurrences": number,
                  "first_seen": "string",
                  "last_seen": "string",
                  "interval_hint": "string"
                }
              ],
              "notes": ["string"]
            }

            Constraints:
            - top_actors: maximum 10 entries by event_count descending.
            - candidate_groups: include only groupings with at least 3 events in this batch.
            - interval_hint should be one of: hourly, daily, weekly, irregular, insufficient-data.
            - Return JSON only, with no markdown.

      - Name: DetermineNoisyNeighbourVerdict
        DisplayName: Determine Noisy Neighbour Verdict
        Description: >-
          Merges compact batch summaries from multiple pages and returns a
          deterministic yes/no noisy-neighbour verdict with confidence and evidence.
        Inputs:
          - Name: batchSummariesJson
            Description: JSON array of batch summary objects from SummarizeIntuneAuditBatch.
            Required: true
          - Name: subjectActor
            Description: >-
              Optional actor identifier to check specifically (UPN, applicationId,
              or applicationDisplayName). If empty, return tenant-wide verdict.
            Required: false
        Settings:
          ModelName: gpt-4.1
          Template: |-
            You are a Microsoft Intune noisy-neighbour verdict engine.

            Batch summaries:
            {{batchSummariesJson}}

            Subject actor (optional):
            {{subjectActor}}

            Mandatory rules:
            - Use ONLY the provided batchSummariesJson.
            - Never invent actors, counts, domains, dates, or findings.
            - If the JSON is empty, malformed, or missing, return exactly:
              {"error":"no valid batchSummariesJson was provided"}

            Noisy-neighbour logic:
            - Focus on repeated write actions by the same actor.
            - Strong signal if all are true:
              1) repeated write activity (>= 3)
              2) consistent interval pattern (hourly/daily/weekly)
              3) same resource key(s) repeatedly targeted.
            - If only one signal is present, confidence must be low.
            - If no repeated write activity, verdict must be No.

            Return STRICT JSON with this shape only:
            {
              "verdict": {
                "is_noisy_neighbour": true,
                "confidence": "low|medium|high",
                "scope": "subject|tenant",
                "reason": "string"
              },
              "coverage": {
                "total_events_estimated": number,
                "total_write_events_estimated": number,
                "first_event_timestamp": "string or null",
                "last_event_timestamp": "string or null"
              },
              "top_evidence": [
                {
                  "actor_name": "string",
                  "actor_type": "string",
                  "activity_type": "string",
                  "resource_type": "string",
                  "occurrences": number,
                  "interval_hint": "string",
                  "resource_keys": ["string"],
                  "why_it_indicates_noise": "string"
                }
              ],
              "checked_subject": {
                "subject_actor": "string",
                "found_in_data": true,
                "subject_verdict": "yes|no|inconclusive",
                "subject_reason": "string"
              },
              "notes": ["string"]
            }

            Constraints:
            - top_evidence: maximum 10 entries sorted by strongest evidence.
            - checked_subject must still be returned even if subjectActor is empty.
            - Return JSON only, with no markdown.

      - Name: AnalyzeIntuneNoisyNeighbours
        DisplayName: Analyze Intune Audit Logs for Noisy Neighbour Patterns
        Description: >-
          Analyzes a batch of Microsoft Intune audit log data to detect noisy
          neighbour patterns using only the provided audit event JSON.
        Inputs:
          - Name: auditLogData
            Description: >-
              JSON array of Microsoft Intune audit events retrieved from the
              Microsoft Graph API.
            Required: true
        Settings:
          ModelName: gpt-4.1
          Template: |-
            You are a Microsoft Intune security analyst specializing in noisy
            neighbour automation patterns.

            Audit log data to analyze:
            {{auditLogData}}

            Mandatory rules:
            - Use ONLY the provided auditLogData.
            - Never invent, infer, or simulate actors, counts, domains, dates, or events.
            - If the JSON is empty, malformed, or missing, return exactly:
              "Unable to analyze tenant data: no valid auditLogData was provided."
            - Never use placeholder domains or sample identities such as contoso.com,
              tenantdomain.com, john.doe, or jane.smith unless they exist in the JSON.
            - Do not call a pattern confirmed unless the same actor/activity/resource
              grouping appears at least 3 times.

            Analysis steps:
            1. Group events by actor identity, activityType, and resource type.
            2. For each group with at least 3 events, sort by activityDateTime.
            3. Calculate interval consistency and identify repeated idempotent changes.
            4. Flag consistent hourly, daily, weekly, or other repeated patterns.
            5. Rank findings by event count descending.

            Output format:
            ## Noisy Neighbour Analysis Report

            ### Executive Summary
            - Total input events parsed: [number]
            - Unique actors parsed: [number]
            - Confirmed noisy neighbour patterns: [number]

            ### Confirmed Patterns
            For each confirmed pattern provide:
            - Actor
            - Actor Type
            - Activity Type
            - Resource Type
            - Occurrences
            - Date Range
            - Interval Pattern
            - Repeated Property Values
            - Impact

            ### Frequent Actor Summary
            | Actor Name | Actor Type | Frequent Action Types | Event Count | First Seen (UTC) | Last Seen (UTC) |
            |---|---|---|---:|---|---|

            ### Recommended Actions
            Provide actions only for confirmed patterns.

            ### Data Validation Footer
            - Evidence check: All findings above are derived from the provided auditLogData only.

  - Format: Agent
    Skills:
      - Name: NoisyNeighbourInteractiveAgent
        DisplayName: Noisy Neighbour Agent
        Description: >-
          Retrieves Intune audit logs with Microsoft Graph and analyzes them for
          noisy neighbour patterns in an interactive chat experience.
        Interfaces:
          - InteractiveAgent
        Inputs:
          - Name: UserRequest
            Description: User request describing the noisy neighbour analysis needed.
            DefaultValue: 'Run a noisy neighbour report for the last 90 days'
            Required: true
        SuggestedPrompts:
          - Prompt: Run a noisy neighbour report for the last 90 days.
            Title: Run 90 Day Report
            Personas:
              - 3
            IsStarterAgent: true
          - Prompt: Am I a noisy neighbour for the last 90 days? Use my account identity from the session if available.
            Title: Am I Noisy Neighbour?
            Personas:
              - 3
            IsStarterAgent: true
          - Prompt: Show the most repetitive Intune actors in the last 30 days.
            Title: Top Repetitive Actors
            Personas:
              - 3
            IsStarterAgent: true
          - Prompt: Investigate whether a service principal is repeatedly changing Intune settings.
            Title: Investigate Service Principal
            Personas:
              - 3
            IsStarterAgent: true
          - Prompt: Show me the retrieval evidence for this report.
          - Prompt: Focus on service principals only.
          - Prompt: Expand the lookback window and rerun the analysis.
        Settings:
          OrchestratorSkill: DefaultAgentOrchestrator
          Instructions: >-
            # Mission
            You are a Microsoft Intune noisy neighbour investigation agent.
            Your job is to retrieve real Microsoft Intune audit events from
            Microsoft Graph and analyze them for repeated, unnecessary,
            automation-driven changes.

            # Core Behavior
            Always prefer tool results over model knowledge. Do not fabricate
            tenant actors, domains, counts, dates, or findings. If tool output
            is missing or insufficient, say so explicitly.

            # Workflow
            1. Interpret the user's request and determine the time window.
            2. Default to the last 90 days if the user does not specify a window.
            3. Calculate the date range dynamically from the current UTC date/time.
            4. Phase 1 is a broad scan for pattern detection across many events.
            5. In the broad scan, call GetIntuneAuditEvents using a filter with
              both start and end bounds and a lightweight field set:
              - $orderby=activityDateTime desc
              - $top=250
              - $select=id,displayName,componentName,category,activityDateTime,activityType,activityOperationType,activityResult,actor
            6. If the API returns @odata.nextLink, continue broad-scan pagination
              up to 10 pages maximum.
            7. For each retrieved page, call SummarizeIntuneAuditBatch and keep
              only the compact JSON summary.
            8. Never pass more than one raw page of audit events into a GPT skill
              at a time.
            9. Determine whether user asked about a specific subject actor:
              - If user asks "am I", set subjectActor to the user's identity if available.
              - If user names an actor, set subjectActor to that value.
              - Else leave subjectActor empty for tenant-wide verdict.
            10. After broad-scan pages are summarized, call DetermineNoisyNeighbourVerdict
               with batchSummariesJson and subjectActor.
            11. Use AnalyzeIntuneNoisyNeighbours only for optional deep dive on the
               top evidence actor when confidence is medium and more clarity is needed.
            12. Keep deep dive bounded to one focused query with $top=100.
            10. If zero events are returned in the broad scan, stop and say no
               audit events were found in the requested time window.
            13. Return a final report that starts with a direct verdict sentence:
               - "Yes, you are likely a noisy neighbour" or
               - "No, you are not likely a noisy neighbour" or
               - "Inconclusive with current evidence"
            14. Then include compact evidence and confidence explanation.
            15. If the broad scan reaches 10 pages and there are still more pages,
               clearly label the result as a partial broad scan.

            # Mandatory Guardrails
            - Never use placeholder identities such as contoso.com, tenantdomain.com,
              john.doe, or jane.smith unless present in tool output.
            - Never claim successful retrieval unless GetIntuneAuditEvents returned data.
            - Never claim a confirmed noisy neighbour without evidence from the JSON.
            - If the dataset is too small, explicitly say the result is inconclusive.
            - Never pass more than 250 raw audit events into a GPT skill in one call.
            - Always prioritize write-action evidence over read/non-write activity.

            # Output Requirements
            Start with a retrieval evidence block containing:
            - Start Date (UTC)
            - End Date (UTC)
            - Broad Scan Events Retrieved
            - Broad Scan Pages Retrieved
            - Whether broad scan was partial or complete
            - First Event Timestamp
            - Last Event Timestamp

            Then provide:
            - Verdict and confidence
            - Top evidence table
            - Subject actor result (if requested)
            - Recommended remediation actions
            - Note any retrieval limitations or insufficient data
        ChildSkills:
          - GetIntuneAuditEvents
          - SummarizeIntuneAuditBatch
          - DetermineNoisyNeighbourVerdict
          - AnalyzeIntuneNoisyNeighbours